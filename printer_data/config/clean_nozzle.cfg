#####################################################################
# CLEAN NOZZLE MAIN MACRO
#####################################################################
# All cleaning variants call this macro with parameters.
# Variables are kept for bucket_x/bucket_y so other macros
# (PRINT_START, _TOOLHEAD_PARK, etc.) can read them.
#####################################################################
[gcode_macro clean_nozzle]

# Bucket / wipe geometry — referenced by other macros via
#   printer["gcode_macro clean_nozzle"].bucket_x  etc.
variable_bucket_x: 288
variable_bucket_y: 303
variable_start_x: 275
variable_start_y: 300
variable_start_z: 0.70
variable_wipe_dist: -37

# Travel speeds
variable_prep_spd_xy: 6000
variable_prep_spd_z: 1500
variable_wipe_spd: 200          # mm/s

gcode:
    # ---- Parameters (with sensible defaults) ----
    {% set p_wipe_qty   = params.WIPE_QTY|default(10)|int %}
    {% set p_purge      = params.PURGE|default(0)|int %}
    {% set p_purge_len  = params.PURGE_LEN|default(15)|int %}
    {% set p_purge_spd  = params.PURGE_SPD|default(150)|int %}
    {% set p_load       = params.LOAD|default(0)|int %}
    {% set p_load_len   = params.LOAD_LEN|default(60)|int %}
    {% set p_retract    = params.RETRACT|default(10)|int %}
    {% set p_ooze_dwell = params.OOZE_DWELL|default(1)|int %}
    {% set p_park       = params.PARK|default(1)|int %}
    {% set purge_temp_min = printer.configfile.settings.extruder.min_extrude_temp %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 60 %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    SAVE_GCODE_STATE NAME=clean_nozzle
    G90

    # Move to bucket
    G1 X{bucket_x} Y{bucket_y} F{prep_spd_xy}
    G1 Z{start_z} F{prep_spd_z}

    # Purge (optional)
    {% if p_purge and printer.extruder.temperature >= purge_temp_min %}
        M83
        {% if p_load %}
            G1 E{p_load_len} F{max_velocity}
        {% endif %}
        G1 E{p_purge_len} F{p_purge_spd}
        {% if p_retract > 0 %}
            G1 E-{p_retract} F{max_velocity}
        {% endif %}
        {% if p_ooze_dwell > 0 %}
            G4 P{p_ooze_dwell * 1000}
        {% endif %}
        G92 E0
    {% endif %}

    # Wipe
    G1 X{start_x} Y{start_y} F{prep_spd_xy}
    {% for _ in range(p_wipe_qty) %}
        G1 X{start_x + wipe_dist} Y{start_y} F{wipe_spd * 60}
        G1 X{start_x} Y{start_y} F{wipe_spd * 60}
        G1 X{start_x + wipe_dist} Y{start_y - 5} F{wipe_spd * 60}
        G1 X{start_x} Y{start_y - 5} F{wipe_spd * 60}
    {% endfor %}

    # Lift
    G1 X{start_x + wipe_dist - 10} Y{start_y} F{wipe_spd * 60}
    G1 Z15 F{prep_spd_z}

    # Park (optional)
    {% if p_park %}
        G1 X{bucket_x} Y{bucket_y} F{prep_spd_xy}
    {% endif %}

    M117 Cleaned!
    RESTORE_GCODE_STATE NAME=clean_nozzle

#####################################################################
# CONVENIENCE MACROS — thin wrappers around clean_nozzle
#####################################################################

# Wipe only, no purge (used in PRINT_START, _CQGL)
[gcode_macro CLEAN_NOPURGE]
gcode:
    CLEAN_NOZZLE WIPE_QTY=3 PURGE=0 PARK={params.PARK|default(1)}

# Large purge + wipe
[gcode_macro CLEAN_PURGE]
gcode:
    CLEAN_NOZZLE WIPE_QTY=5 PURGE=1 PURGE_LEN=100 PARK={params.PARK|default(1)}

# Small purge (prime), no retract, no dwell — ready to print immediately
[gcode_macro CLEAN_PRIME]
gcode:
    CLEAN_NOZZLE WIPE_QTY=5 PURGE=1 PURGE_LEN=15 RETRACT=0 OOZE_DWELL=0 PARK={params.PARK|default(1)}

# Fast-load filament + purge + wipe
[gcode_macro CLEAN_LOAD]
gcode:
    CLEAN_NOZZLE WIPE_QTY=5 PURGE=1 PURGE_LEN=25 LOAD=1 LOAD_LEN=50 RETRACT=0 OOZE_DWELL=0 PARK={params.PARK|default(1)}

# Hot-to-cold deep cleaning: heat, start cooling, fan on, wipe lots
[gcode_macro CLEAN_HOTCOLD]
variable_temperature_offset: 30
gcode:
    {% set extruder_target = printer[printer.toolhead.extruder].target %}
    {% set extruder_temperature = printer[printer.toolhead.extruder].temperature %}
    {% set cooltemp_target = extruder_target - temperature_offset %}
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp %}
    {% if extruder_target >= min_extrude_temp and extruder_temperature >= min_extrude_temp %}
        M109 S{extruder_target}
        M104 S{cooltemp_target}
        M106 S255
        G4 P10000
        CLEAN_NOZZLE WIPE_QTY=50 PURGE=0
        M106 S0
    {% endif %}